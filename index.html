<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>אמונה</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #F5F0E6;
      color: #1C1917;
      font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    main {
      width: 100%;
      max-width: 480px;
      padding: 64px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Logo placeholder */
    .logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      background: #EDE3C5;
      border: 1.5px solid #D6C9A8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #78716C;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      line-height: 1.25;
    }

    h1 span { color: #E8A820; }

    .subtitle {
      font-size: 16px;
      color: #78716C;
      text-align: center;
      line-height: 1.6;
    }

    /* Benefit rows */
    .benefits {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .benefit {
      background: #FFFFFF;
      border: 1.5px solid #EDE3C5;
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      flex-direction: row-reverse;
      align-items: center;
      gap: 12px;
    }

    .check {
      width: 24px;
      height: 24px;
      border-radius: 12px;
      background: #35ABEA;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #fff;
      font-size: 13px;
    }

    .benefit p {
      font-size: 15px;
      color: #1C1917;
      text-align: right;
      flex: 1;
    }

    /* App Store placeholder */
    .store-badge {
      margin-top: 8px;
      background: #1C1917;
      color: #F5F0E6;
      border-radius: 14px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      display: inline-block;
    }

    footer {
      margin-top: auto;
      padding: 24px;
      font-size: 13px;
      color: #78716C;
      text-align: center;
      direction: ltr;
    }

    footer a {
      color: #35ABEA;
      text-decoration: none;
      margin: 0 6px;
    }
  </style>
</head>
<body>
  <main>

    <div class="logo">logo</div>

    <h1>השג שלווה פנימית<br/><span>בעזרת שיעורי השם</span></h1>

    <p class="subtitle">שאל שאלות, קבל תשובות מהתנ״ך, וצא למסע אישי של 7 ימים.</p>

    <div class="benefits">
      <div class="benefit">
        <div class="check">✓</div>
        <p>תמצא תשובות בתנ״ך</p>
      </div>
      <div class="benefit">
        <div class="check">✓</div>
        <p>תמצא תשובות לחיים בעזרת דבר ה׳</p>
      </div>
      <div class="benefit">
        <div class="check">✓</div>
        <p>תשאל כמה שאלות שאתה רוצה</p>
      </div>
    </div>

    <a class="store-badge" href="#">App Store — בקרוב</a>

  </main>

  <footer>
    <a href="privacy.html">Privacy Policy</a> ·
    <a href="mailto:jonyyadgar@gmail.com">Support</a> ·
    © 2025 אמונה
  </footer>
</body>
</html>
